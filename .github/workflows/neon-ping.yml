name: Keep Services Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Neon (via app health)
        run: curl -fsS --max-time 20 "${{ secrets.APP_URL }}/api/health" || true

      - name: Ping Railway crawler
        if: ${{ secrets.CRAWLER_URL != '' }}
        run: curl -fsS --max-time 20 "${{ secrets.CRAWLER_URL }}/health" || true